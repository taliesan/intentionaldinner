<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Intentional Dinner</title>
  <meta name="description" content="A simple, intentional guide to hosting a dinner that raises money for the work you believe in.">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,700;1,9..144,400&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{--warm-cream:#FAF6F0;--deep-oak:#3D2B1F;--rust:#B5543B;--soft-rust:#D4836B;--sage:#7A8B6F}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Source Sans 3',sans-serif;background:var(--warm-cream);color:var(--deep-oak);line-height:1.6;-webkit-font-smoothing:antialiased}
    .hero{min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:2rem;position:relative}
    .hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(181,84,59,.06) 0%,transparent 60%),radial-gradient(ellipse at 80% 30%,rgba(122,139,111,.06) 0%,transparent 50%);z-index:0}
    .hero-content{position:relative;z-index:1;max-width:640px}
    h1{font-family:'Fraunces',serif;font-weight:300;font-size:clamp(2.6rem,7vw,4.5rem);line-height:1.1;letter-spacing:-0.02em;margin-bottom:1.5rem}
    h1 em{font-style:italic;font-weight:400;color:var(--rust)}
    .subtitle{font-size:1.15rem;font-weight:300;color:var(--soft-rust);max-width:440px;margin:0 auto 2.5rem;line-height:1.7}
    .coming-soon{display:inline-block;font-size:.8rem;font-weight:500;letter-spacing:.15em;text-transform:uppercase;color:var(--sage);border:1px solid var(--sage);border-radius:2rem;padding:.5rem 1.5rem}
  </style>
</head>
<body>
  <div class="hero">
    <div class="hero-content">
      <h1>The <em>Intentional</em> Dinner</h1>
      <p class="subtitle">A simple guide to hosting a dinner that raises money for the work you believe in.</p>
      <span class="coming-soon">Coming Soon</span>
    </div>
  </div>
</body>
</html>
